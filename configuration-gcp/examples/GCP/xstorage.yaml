# Example XStorage — multiple buckets exercising the full option surface, plus
# bucket IAM members that reference buckets by refName (bucketRef -> name).
#
# NOTE: GCS bucket names are GLOBALLY unique across all of GCP, so they are
# prefixed with the project id here. Change them if they collide.
apiVersion: platform.example.org/v1alpha1
kind: XStorage
metadata:
  name: demo-storage
spec:
  compositionSelector:
    matchLabels:
      cloud: gcp
  projectID: devopslab-tuzel

  buckets:
    # 1) App data — versioned, lifecycle-managed, uniform access, CMEK-ready.
    - name: devopslab-tuzel-app-data
      location: US
      storageClass: STANDARD
      uniformBucketLevelAccess: true
      publicAccessPrevention: enforced
      versioning: true
      forceDestroy: true
      labels:
        env: prod
        team: platform
      lifecycleRules:
        - action: { type: SetStorageClass, storageClass: NEARLINE }
          condition: { age: 30 }
        - action: { type: SetStorageClass, storageClass: COLDLINE }
          condition: { age: 90 }
        - action: { type: Delete }
          condition: { age: 365 }
        - action: { type: Delete }
          condition: { numNewerVersions: 5, withState: ARCHIVED }

    # 2) Static website bucket — website config + public read via IAM below.
    - name: devopslab-tuzel-static-site
      location: US
      storageClass: STANDARD
      uniformBucketLevelAccess: true
      publicAccessPrevention: inherited
      forceDestroy: true
      website:
        mainPageSuffix: index.html
        notFoundPage: 404.html
      cors:
        - origin: ["*"]
          method: ["GET", "HEAD"]
          responseHeader: ["Content-Type"]
          maxAgeSeconds: 3600

    # 3) Logs/archive — autoclass (must start STANDARD), locked retention,
    #    soft delete window. Autoclass auto-tiers objects down to ARCHIVE.
    - name: devopslab-tuzel-logs
      location: us-central1
      storageClass: STANDARD          # Autoclass requires STANDARD as the class
      uniformBucketLevelAccess: true
      publicAccessPrevention: enforced
      forceDestroy: true
      retentionPolicy:
        retentionPeriod: 2592000   # 30 days, in seconds
        isLocked: false
      softDeleteRetentionSeconds: 604800   # 7 days
      autoclass:
        enabled: true
        terminalStorageClass: ARCHIVE

  iamMembers:
    # Public read for the static site (works with uniform bucket-level access).
    - name: site-public-read
      bucketRef: devopslab-tuzel-static-site
      role: roles/storage.objectViewer
      member: allUsers

    # App SA gets object admin on the app-data bucket.
    - name: appdata-sa-admin
      bucketRef: devopslab-tuzel-app-data
      role: roles/storage.objectAdmin
      member: serviceAccount:crossplane@devopslab-tuzel.iam.gserviceaccount.com
