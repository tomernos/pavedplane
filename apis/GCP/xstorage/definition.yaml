# XRD for GCS buckets — exposes the full Bucket option surface plus bucket IAM.
#
# Same conventions as XNetwork:
#   - apiextensions.crossplane.io/v2, scope: Cluster
#   - arrays of resources with refName cross-references
#       buckets[].name        is the refName (and the GLOBALLY-UNIQUE GCS name)
#       iamMembers[].bucketRef -> matches a buckets[].name
#
# The XRD exposes friendly singletons (versioning: bool, encryptionKmsKey: str,
# logging: {...}). The Composition maps them to the Terraform block-ARRAY form
# the Upjet provider expects (versioning: [{enabled: ...}], etc.).
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xstorages.platform.example.org
spec:
  scope: Cluster
  group: platform.example.org
  names:
    kind: XStorage
    plural: xstorages
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [projectID, buckets]
              properties:
                projectID:
                  type: string

                # ---- Buckets -------------------------------------------------
                buckets:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [name, location]
                    properties:
                      name:
                        type: string
                        description: refName AND the globally-unique GCS bucket name.
                      location:
                        type: string
                        description: US, EU, ASIA, or a region like us-central1.
                      storageClass:
                        type: string
                        enum: [STANDARD, NEARLINE, COLDLINE, ARCHIVE]
                        default: STANDARD
                      forceDestroy:
                        type: boolean
                        default: false
                        description: Delete bucket even if it still holds objects.
                      uniformBucketLevelAccess:
                        type: boolean
                        default: true
                      publicAccessPrevention:
                        type: string
                        enum: [enforced, inherited]
                        default: enforced
                      requesterPays:
                        type: boolean
                        default: false
                      defaultEventBasedHold:
                        type: boolean
                        default: false
                      versioning:
                        type: boolean
                        default: false
                      labels:
                        type: object
                        additionalProperties:
                          type: string
                      encryptionKmsKey:
                        type: string
                        description: CMEK — defaultKmsKeyName for the bucket.
                      logging:
                        type: object
                        properties:
                          logBucket: { type: string }
                          logObjectPrefix: { type: string }
                        required: [logBucket]
                      website:
                        type: object
                        required: [mainPageSuffix]
                        properties:
                          mainPageSuffix: { type: string }
                          notFoundPage: { type: string }
                      retentionPolicy:
                        type: object
                        properties:
                          retentionPeriod: { type: integer }
                          isLocked: { type: boolean }
                        required: [retentionPeriod]
                      autoclass:
                        type: object
                        properties:
                          enabled: { type: boolean }
                          terminalStorageClass:
                            type: string
                            enum: [NEARLINE, ARCHIVE]
                        required: [enabled]
                      softDeleteRetentionSeconds:
                        type: integer
                        description: 0 disables soft delete; else retention seconds.
                      cors:
                        type: array
                        items:
                          type: object
                          properties:
                            origin: { type: array, items: { type: string } }
                            method: { type: array, items: { type: string } }
                            responseHeader: { type: array, items: { type: string } }
                            maxAgeSeconds: { type: integer }
                      lifecycleRules:
                        type: array
                        items:
                          type: object
                          required: [action]
                          properties:
                            action:
                              type: object
                              required: [type]
                              properties:
                                type:
                                  type: string
                                  enum: [Delete, SetStorageClass, AbortIncompleteMultipartUpload]
                                storageClass:
                                  type: string
                            condition:
                              type: object
                              properties:
                                age: { type: integer }
                                createdBefore: { type: string }
                                numNewerVersions: { type: integer }
                                daysSinceCustomTime: { type: integer }
                                withState:
                                  type: string
                                  enum: [LIVE, ARCHIVED, ANY]
                                matchesStorageClass: { type: array, items: { type: string } }
                                matchesPrefix: { type: array, items: { type: string } }
                                matchesSuffix: { type: array, items: { type: string } }

                # ---- Bucket IAM (additive members) ---------------------------
                iamMembers:
                  type: array
                  items:
                    type: object
                    required: [name, bucketRef, role, member]
                    properties:
                      name:
                        type: string
                      bucketRef:
                        type: string
                        description: Must match one of buckets[].name.
                      role:
                        type: string
                        description: e.g. roles/storage.objectViewer.
                      member:
                        type: string
                        description: e.g. user:a@b.com, serviceAccount:..., allUsers.
                      condition:
                        type: object
                        properties:
                          title: { type: string }
                          description: { type: string }
                          expression: { type: string }
                        required: [title, expression]
            status:
              type: object
              properties:
                bucketCount: { type: integer }
                iamMemberCount: { type: integer }
